
services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    restart: always
    env_file:
      - .env
    ports:
      - "8081:80"
    depends_on:
      - postgres

  backend:
    build: .
    container_name: backend
    image: dev_env
    volumes:
      - .:/app_dev
    ports:
      - "7777:7777"
    env_file:
      - .env
    depends_on:
      - postgres
    stdin_open: true
    tty: true